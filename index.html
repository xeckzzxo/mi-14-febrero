<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tú mi 14 de febrero</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Pacifico&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
background:radial-gradient(circle at bottom,#02020a,#000);
font-family:'Nunito',sans-serif;
overflow:hidden;
color:white;
text-align:center;
}

/* TEXTO PRINCIPAL */
.titulo{
position:absolute;
top:20px;
width:100%;
padding:0 20px;
font-family:'Pacifico',cursive;
font-size:22px;
color:#ffd1f0;
text-shadow:0 0 12px rgba(255,182,193,.6);
z-index:3;
}

/* CONTENEDOR CENTRAL */
.scene{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:min(90vw,420px);
height:min(90vw,420px);
}

/* CORAZÓN */
.heart{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:65%;
aspect-ratio:1;
background:radial-gradient(circle,#ff8fc7,#ff4fa3);
clip-path:path("M135 240 C25 155 5 85 70 45 C105 25 135 45 135 75 C135 45 165 25 200 45 C265 85 245 155 135 240 Z");
box-shadow:0 0 50px rgba(255,105,180,.9);
animation:latido 1.6s infinite;
overflow:hidden;
}

.heart img{
width:100%;
height:100%;
object-fit:cover;
mix-blend-mode:screen;
opacity:.9;
}

@keyframes latido{
0%,100%{transform:translate(-50%,-50%) scale(1);}
50%{transform:translate(-50%,-50%) scale(1.08);}
}

/* ÓRBITA */
.orbit{
position:absolute;
inset:0;
animation:spin 30s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

/* FOTOS */
.photo{
position:absolute;
width:70px;
height:70px;
border-radius:14px;
object-fit:cover;
box-shadow:0 0 15px rgba(255,182,193,.4);
cursor:pointer;
}

/* POSICIONES SIMÉTRICAS */
.p1{top:-10px; left:50%; transform:translateX(-50%);}
.p2{top:20%; right:-10px;}
.p3{bottom:20%; right:-10px;}
.p4{bottom:-10px; left:50%; transform:translateX(-50%);}
.p5{bottom:20%; left:-10px;}
.p6{top:20%; left:-10px;}
.p7{top:50%; right:-25px; transform:translateY(-50%);}

/* VISOR */
.viewer{
position:fixed;
inset:0;
background:rgba(0,0,0,.92);
display:none;
justify-content:center;
align-items:center;
z-index:10;
}

.viewer img{
max-width:90%;
max-height:80%;
border-radius:20px;
box-shadow:0 0 25px rgba(255,182,193,.6);
}

/* MENSAJE SECRETO */
.secret{
position:fixed;
bottom:-100%;
left:0;
width:100%;
background:rgba(10,10,20,.95);
padding:30px;
font-size:16px;
line-height:1.7;
transition:.8s;
overflow:auto;
max-height:80%;
}

.secret.show{
bottom:0;
}

.btn-secret{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#ff4fa3;
border:none;
padding:12px 20px;
border-radius:20px;
color:white;
font-size:14px;
cursor:pointer;
box-shadow:0 0 15px rgba(255,105,180,.7);
}

/* BOTÓN MÚSICA */
.music-btn{
position:absolute;
top:20px;
right:20px;
background:#ff4fa3;
border:none;
padding:10px 14px;
border-radius:20px;
color:white;
font-size:12px;
cursor:pointer;
z-index:4;
}
</style>
</head>

<body>

<div class="titulo">💗 Tú mi 14 de febrero &lt;3 💗</div>

<button class="music-btn" onclick="toggleMusic()">🎵 Música</button>

<div class="scene">

<div class="heart">
<img src="gacha.jpg">
</div>

<div class="orbit">
<img src="foto1.jpg" class="photo p1">
<img src="foto2.jpg" class="photo p2">
<img src="foto3.jpg" class="photo p3">
<img src="foto4.jpg" class="photo p4">
<img src="foto5.jpg" class="photo p5">
<img src="foto6.jpg" class="photo p6">
<img src="foto7.jpg" class="photo p7">
</div>

</div>

<button class="btn-secret" onclick="showSecret()">Mensaje secreto 💌</button>

<div class="viewer" id="viewer">
<img id="viewerImg">
</div>

<div class="secret" id="secret">
Hola mi niña, sé que éste día es muy especial para nosotros aparte nuestra fecha obviooo...
</div>

<audio id="music" loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
/* VISOR */
const viewer=document.getElementById("viewer");
const viewerImg=document.getElementById("viewerImg");
document.querySelectorAll(".photo").forEach(img=>{
img.onclick=()=>{
viewer.style.display="flex";
viewerImg.src=img.src;
}
});
viewer.onclick=()=>viewer.style.display="none";

/* MENSAJE */
function showSecret(){
document.getElementById("secret").classList.toggle("show");
}

/* MÚSICA */
const music=document.getElementById("music");
function toggleMusic(){
if(music.paused){music.play();}
else{music.pause();}
}
</script>

</body>
</html>
