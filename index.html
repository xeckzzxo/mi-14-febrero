<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tú mi 14 de febrero</title>

<style>
body{
margin:0;
background:black;
font-family:'Segoe UI',sans-serif;
color:white;
overflow:hidden;
text-align:center;
}

/* TEXTO */
.texto{
position:absolute;
top:20px;
width:100%;
padding:0 20px;
font-size:20px;
color:#ff9ecb;
line-height:1.5;
}

/* CORAZÓN */
.heart{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) rotate(-45deg);
width:260px;
height:230px;
background:#ff6fae;
box-shadow:0 0 30px rgba(255,105,180,.6);
animation:latido 1.5s infinite;
}

.heart:before,
.heart:after{
content:"";
position:absolute;
width:260px;
height:230px;
background:#ff6fae;
border-radius:50%;
}

.heart:before{top:-130px;left:0;}
.heart:after{left:130px;top:0;}

@keyframes latido{
0%,100%{transform:translate(-50%,-50%) rotate(-45deg) scale(1);}
50%{transform:translate(-50%,-50%) rotate(-45deg) scale(1.1);}
}

/* FOTO CENTRO */
.heart img{
position:absolute;
width:170px;
height:170px;
object-fit:cover;
border-radius:50%;
top:30px;
left:45px;
transform: rotate(45deg);
}

/* FOTOS FLOTANTES */
.foto{
position:absolute;
width:90px;
height:90px;
border-radius:15px;
object-fit:cover;
opacity:.35;
animation:flotar linear infinite;
}

@keyframes flotar{
from{transform:translateY(110vh);}
to{transform:translateY(-120vh);}
}

/* VISOR */
.viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
display:none;
justify-content:center;
align-items:center;
z-index:5;
}

.viewer img{
max-width:90%;
max-height:80%;
border-radius:20px;
}
</style>
</head>

<body>

<div class="texto">
💗 Tú mi 14 de febrero &lt;3 💗 <br><br>
Eres mi lugar seguro, mi casualidad favorita,  
la historia que siempre quiero seguir escribiendo.  
Gracias por existir 💕
</div>

<div class="heart">
<img src="gacha.jpg">
</div>

<!-- 7 FOTOS -->
<img src="foto1.jpg" class="foto" style="left:5%; animation-duration:20s;">
<img src="foto2.jpg" class="foto" style="left:20%; animation-duration:26s;">
<img src="foto3.jpg" class="foto" style="left:35%; animation-duration:23s;">
<img src="foto4.jpg" class="foto" style="left:50%; animation-duration:28s;">
<img src="foto5.jpg" class="foto" style="left:65%; animation-duration:24s;">
<img src="foto6.jpg" class="foto" style="left:80%; animation-duration:27s;">
<img src="foto7.jpg" class="foto" style="left:90%; animation-duration:22s;">

<!-- VISOR -->
<div class="viewer" id="viewer">
<img id="viewerImg">
</div>

<audio autoplay loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
const viewer=document.getElementById("viewer");
const viewerImg=document.getElementById("viewerImg");

document.querySelectorAll(".foto").forEach(img=>{
img.addEventListener("click",()=>{
viewer.style.display="flex";
viewerImg.src=img.src;
});
});

viewer.addEventListener("click",()=>{
viewer.style.display="none";
});
</script>

</body>
</html>
