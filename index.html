<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tú mi 14 de febrero</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Pacifico&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:radial-gradient(circle at center, #120012, #000);
font-family:'Nunito',sans-serif;
color:white;
text-align:center;
overflow:hidden;
}

/* TEXTO */
.texto{
position:absolute;
top:25px;
width:100%;
padding:0 20px;
font-size:22px;
color:#ffc1e3;
line-height:1.6;
font-family:'Pacifico',cursive;
text-shadow:0 0 10px rgba(255,182,193,.6);
animation:fadeIn 2s ease;
}

/* CORAZÓN */
.heart{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:270px;
height:250px;
background:radial-gradient(circle at 50% 40%, #ff8fc7, #ff4fa3);
clip-path:path("M135 240 C25 155 5 85 70 45 C105 25 135 45 135 75 C135 45 165 25 200 45 C265 85 245 155 135 240 Z");
box-shadow:0 0 50px rgba(255,105,180,.9);
animation:latido 1.6s infinite;
overflow:hidden;
}

/* FOTO DIFUMINADA */
.heart img{
width:100%;
height:100%;
object-fit:cover;
mix-blend-mode:screen;
opacity:.9;
filter:blur(.5px);
}

/* LATIDO */
@keyframes latido{
0%,100%{transform:translate(-50%,-50%) scale(1);}
50%{transform:translate(-50%,-50%) scale(1.1);}
}

/* GALERÍA */
.galeria{
position:absolute;
bottom:20px;
width:100%;
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
padding:0 10px;
z-index:2;
}

.galeria img{
width:70px;
height:70px;
border-radius:14px;
object-fit:cover;
cursor:pointer;
box-shadow:0 0 15px rgba(255,182,193,.4);
transition:.3s;
}

.galeria img:hover{
transform:scale(1.15);
}

/* VISOR */
.viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.92);
display:none;
justify-content:center;
align-items:center;
z-index:10;
}

.viewer img{
max-width:90%;
max-height:80%;
border-radius:20px;
box-shadow:0 0 25px rgba(255,182,193,.6);
}

/* CORAZONES FLOTANDO */
.corazon{
position:absolute;
color:#ff7ebc;
font-size:20px;
animation:flotar linear infinite;
opacity:.6;
}

@keyframes flotar{
from{transform:translateY(110vh);}
to{transform:translateY(-120vh);}
}

/* SPARKLES */
.sparkle{
position:absolute;
width:4px;
height:4px;
background:white;
border-radius:50%;
opacity:.8;
animation:brillo 2s infinite ease-in-out;
}

@keyframes brillo{
0%,100%{opacity:.2;transform:scale(.5);}
50%{opacity:1;transform:scale(1.2);}
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(-10px);}
to{opacity:1;}
}
</style>
</head>

<body>

<div class="texto">
💗 Tú mi 14 de febrero &lt;3 💗 <br><br>
Eres mi casualidad más bonita,  
mi lugar seguro y la historia  
que quiero seguir escribiendo cada día 💕
</div>

<div class="heart">
<img src="gacha.jpg">
</div>

<!-- GALERÍA -->
<div class="galeria">
<img src="foto1.jpg">
<img src="foto2.jpg">
<img src="foto3.jpg">
<img src="foto4.jpg">
<img src="foto5.jpg">
<img src="foto6.jpg">
<img src="foto7.jpg">
</div>

<div class="viewer" id="viewer">
<img id="viewerImg">
</div>

<audio autoplay loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
/* VISOR */
const viewer=document.getElementById("viewer");
const viewerImg=document.getElementById("viewerImg");

document.querySelectorAll(".galeria img").forEach(img=>{
img.addEventListener("click",()=>{
viewer.style.display="flex";
viewerImg.src=img.src;
});
});

viewer.addEventListener("click",()=>viewer.style.display="none");

/* CORAZONES */
function crearCorazon(){
const c=document.createElement("div");
c.className="corazon";
c.innerHTML="💗";
c.style.left=Math.random()*100+"vw";
c.style.fontSize=(15+Math.random()*20)+"px";
c.style.animationDuration=(6+Math.random()*4)+"s";
document.body.appendChild(c);
setTimeout(()=>c.remove(),10000);
}
setInterval(crearCorazon,800);

/* SPARKLES */
for(let i=0;i<40;i++){
let s=document.createElement("div");
s.className="sparkle";
s.style.top=Math.random()*100+"vh";
s.style.left=Math.random()*100+"vw";
s.style.animationDelay=Math.random()*2+"s";
document.body.appendChild(s);
}
</script>

</body>
</html>
