<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tú mi 14 de febrero</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Pacifico&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:radial-gradient(circle at bottom, #050510, #000);
font-family:'Nunito',sans-serif;
color:white;
overflow:hidden;
text-align:center;
}

/* ESTRELLAS */
.stars{
position:fixed;
width:100%;
height:100%;
background:transparent;
z-index:0;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
opacity:.8;
animation:twinkle 2s infinite ease-in-out;
}

@keyframes twinkle{
0%,100%{opacity:.2;}
50%{opacity:1;}
}

/* TEXTO */
.texto{
position:absolute;
top:25px;
width:100%;
padding:0 20px;
font-size:22px;
color:#ffd1f0;
line-height:1.6;
font-family:'Pacifico',cursive;
text-shadow:0 0 12px rgba(255,182,193,.6);
z-index:2;
}

/* CORAZÓN */
.heart{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:270px;
height:250px;
background:radial-gradient(circle at 50% 40%, #ff8fc7, #ff4fa3);
clip-path:path("M135 240 C25 155 5 85 70 45 C105 25 135 45 135 75 C135 45 165 25 200 45 C265 85 245 155 135 240 Z");
box-shadow:0 0 60px rgba(255,105,180,.9);
animation:latido 1.6s infinite;
overflow:hidden;
z-index:2;
}

.heart img{
width:100%;
height:100%;
object-fit:cover;
mix-blend-mode:screen;
opacity:.9;
}

@keyframes latido{
0%,100%{transform:translate(-50%,-50%) scale(1);}
50%{transform:translate(-50%,-50%) scale(1.1);}
}

/* PLANETAS (FOTOS) */
.orbita{
position:absolute;
top:50%;
left:50%;
width:320px;
height:320px;
margin:-160px 0 0 -160px;
animation:rotar 25s linear infinite;
z-index:1;
}

.orbita img{
position:absolute;
width:70px;
height:70px;
border-radius:14px;
object-fit:cover;
box-shadow:0 0 15px rgba(255,182,193,.4);
cursor:pointer;
}

@keyframes rotar{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

/* POSICIÓN DE CADA PLANETA */
.p1{top:0; left:50%;}
.p2{top:20%; left:85%;}
.p3{top:70%; left:90%;}
.p4{top:100%; left:50%;}
.p5{top:70%; left:5%;}
.p6{top:20%; left:0%;}
.p7{top:40%; left:95%;}

/* VISOR */
.viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.92);
display:none;
justify-content:center;
align-items:center;
z-index:10;
}

.viewer img{
max-width:90%;
max-height:80%;
border-radius:20px;
box-shadow:0 0 25px rgba(255,182,193,.6);
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="texto">
💗 Tú mi 14 de febrero &lt;3 💗 <br><br>
Eres mi universo favorito,  
la estrella que ilumina  
cada uno de mis días ✨
</div>

<div class="heart">
<img src="gacha.jpg">
</div>

<div class="orbita">
<img src="foto1.jpg" class="p1">
<img src="foto2.jpg" class="p2">
<img src="foto3.jpg" class="p3">
<img src="foto4.jpg" class="p4">
<img src="foto5.jpg" class="p5">
<img src="foto6.jpg" class="p6">
<img src="foto7.jpg" class="p7">
</div>

<div class="viewer" id="viewer">
<img id="viewerImg">
</div>

<audio autoplay loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
/* VISOR */
const viewer=document.getElementById("viewer");
const viewerImg=document.getElementById("viewerImg");

document.querySelectorAll(".orbita img").forEach(img=>{
img.addEventListener("click",()=>{
viewer.style.display="flex";
viewerImg.src=img.src;
});
});
viewer.addEventListener("click",()=>viewer.style.display="none");

/* ESTRELLAS */
const stars=document.getElementById("stars");
for(let i=0;i<120;i++){
let s=document.createElement("div");
s.className="star";
s.style.top=Math.random()*100+"vh";
s.style.left=Math.random()*100+"vw";
s.style.animationDelay=Math.random()*2+"s";
stars.appendChild(s);
}
</script>

</body>
</html>
